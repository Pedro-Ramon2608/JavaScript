<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>

    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>

    <section>
        <div id="msg">
            <label for="numero">Número:</label>
            <input type="number" name="num" id="numero">
            <button id="btn">Gerar Tabuada</button>
        </div>
            
        <div id="result">
            <select name="tabuada" id="restab" size="10">
                <option>Digite um número</option>
            </select>
        </div>
    </section>

    <footer>
        <p>&copy; Ninja</p>
    </footer>
</body>
</html>
