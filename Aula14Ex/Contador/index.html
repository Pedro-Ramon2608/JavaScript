<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>

    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Contador</h1>
    </header>

    <section>
        <div id="msg">
                <p>
                    <label for="inicio">Início:</label>
                    <input type="number" name="cont" id="inicio">
                </p>

                <p>
                    <label for="fim">Fim:</label>
                    <input type="number" name="cont" id="fim">
                </p>

                <p>
                    <label for="passo">Passo:</label>
                    <input type="number" name="cont" id="passo">
                </p>
                
                <p><button id="btn">Contar</button></p>
        </div>
            
        <div id="result">
        </div>
    </section>

    <footer>
        <p>&copy; Ninja</p>
    </footer>
</body>
</html>
